spring.application.name=ms-tienda
server.port = 8086

# Crea la BD vacía en phpMyAdmin antes de arrancar.
# Hibernate generará las tablas desde las entidades.
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_bd
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#update: crea las tablas si no existen, las actualiza
#si el modelo cambió. Esto es ideal para desarrollo local
#uy así entender lo que ocurre internamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# SWAGGER
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html